<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Media Monitor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css?v=2" />
</head>
<body class="min-h-screen bg-gray-950 text-gray-100 flex flex-col items-center">

  <!-- Header -->
  <header class="w-full py-6 bg-gray-900 border-b border-gray-800 text-center">
    <h1 class="text-2xl font-bold tracking-tight">
      <span class="text-indigo-400">AI</span> Media Monitor
    </h1>
    <p class="text-sm text-gray-400 mt-1">
      Monitor brand mentions across top news media — powered by AI
    </p>
  </header>

  <!-- Main form -->
  <main id="form-screen" class="w-full max-w-2xl px-4 py-10">
    <form id="search-form" class="space-y-5 bg-gray-900 p-6 rounded-2xl border border-gray-800 shadow-lg">

      <!-- Topic -->
      <div>
        <label for="topic" class="block text-sm font-medium text-gray-300 mb-1">Search Topic</label>
        <input
          id="topic"
          type="text"
          placeholder="e.g. nuclear energy"
          class="w-full rounded-lg bg-gray-800 border border-gray-700 px-4 py-2.5 text-sm text-gray-100 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-500"
        />
      </div>

      <!-- Brand -->
      <div>
        <label for="brand" class="block text-sm font-medium text-gray-300 mb-1">Brand Name</label>
        <input
          id="brand"
          type="text"
          placeholder="e.g. Siemens"
          class="w-full rounded-lg bg-gray-800 border border-gray-700 px-4 py-2.5 text-sm text-gray-100 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-500"
        />
      </div>

      <!-- Country -->
      <div>
        <label for="country" class="block text-sm font-medium text-gray-300 mb-1">Country</label>
        <select
          id="country"
          class="w-full rounded-lg bg-gray-800 border border-gray-700 px-4 py-2.5 text-sm text-gray-100 focus:outline-none focus:ring-2 focus:ring-indigo-500"
        >
          <option value="">— Select a country —</option>
          <option value="Denmark">Denmark</option>
          <option value="Germany">Germany</option>
          <option value="Hungary">Hungary</option>
        </select>
      </div>

      <!-- Submit -->
      <button
        type="submit"
        id="start-btn"
        class="w-full py-2.5 rounded-lg bg-indigo-600 hover:bg-indigo-500 transition font-semibold text-sm tracking-wide"
      >
        Start
      </button>
    </form>

  </main>

  <!-- ═══ Results screen (hidden by default) ═══ -->
  <main id="results-screen" class="hidden w-full max-w-3xl px-4 py-10">
    <button id="back-btn" class="mb-6 inline-flex items-center gap-1.5 text-sm text-gray-400 hover:text-gray-200 transition">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
      </svg>
      Новый поиск
    </button>

    <!-- Brand variants -->
    <div id="brand-section" class="hidden mb-5">
      <h2 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Варианты бренда</h2>
      <div id="brand-cloud" class="flex flex-wrap gap-2"></div>
    </div>

    <!-- Synonyms cloud -->
    <div id="synonyms-section" class="hidden mb-6">
      <h2 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Ключевые слова</h2>
      <div id="synonyms-cloud" class="flex flex-wrap gap-2"></div>
    </div>

    <!-- Results -->
    <div id="results-section" class="hidden">
      <h2 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-4">
        Публикации <span id="results-count" class="text-indigo-400"></span>
      </h2>
      <div id="results-list" class="space-y-4"></div>
    </div>

    <!-- Empty state -->
    <div id="empty-state" class="hidden mt-10 text-center text-gray-500 text-sm">
      Публикации не найдены. Попробуйте расширить тему поиска.
    </div>
  </main>

  <!-- ═══ Search modal overlay ═══ -->
  <div id="modal-overlay" class="hidden">
    <div class="modal-card">
      <div class="loader"></div>
      <p class="mt-4 text-base font-medium text-gray-100">Ведётся поиск</p>
      <p class="mt-1 text-xs text-gray-500" id="modal-status">Генерация ключевых слов…</p>
    </div>
  </div>

  <!-- ═══ No results modal ═══ -->
  <div id="no-results-overlay" class="hidden">
    <div class="modal-card">
      <svg class="w-10 h-10 text-gray-500 mb-3" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      <p class="text-base font-medium text-gray-100">Публикаций на указанную тему не было</p>
      <button id="no-results-close-btn"
        class="mt-5 px-6 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-500 transition text-sm font-semibold">
        Закрыть
      </button>
    </div>
  </div>

  <script src="app.js?v=2"></script>
</body>
</html>
